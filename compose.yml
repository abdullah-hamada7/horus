services:
  frontend:
    image: abdullahhamada7/egyptian-museum-frontend:latest
    container_name: museum-frontend
    ports:
      - "${PORT:-8080}:3000"
    environment:
      - BACKEND_URL=http://backend:5000
      - RAG_API_URL=${RAG_API_URL}
    restart: always

  backend:
    image: abdullahhamada7/egyptian-museum-backend:latest
    container_name: museum-backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    restart: always
